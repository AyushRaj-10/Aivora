<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Avatar Animation - VAD++</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #202020; /* Sleek dark mode background */
        }
        canvas { 
            display: block; 
        }
    </style>
    <!-- Import Map to resolve bare imports like 'three' in player.js without a bundler -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/examples/jsm/loaders/GLTFLoader.js": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js",
            "three/examples/jsm/controls/OrbitControls.js": "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js"
        }
    }
    </script>
</head>
<body>
    <script type="module" src="player.js"></script>
</body>
</html>
